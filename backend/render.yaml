@"
services:
  - type: web
    name: matriq-backend
    runtime: python
    plan: free
    pythonVersion: 3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port \$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://matriq-frontend.vercel.app,http://localhost:3000
      - key: ENVIRONMENT
        value: production
"@ | Out-File -FilePath render.yaml -Encoding UTF8 -Force